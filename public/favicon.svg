<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2a5a8f"/>
    </linearGradient>
    <linearGradient id="check" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Shield shape -->
  <path d="M256 72c-60 0-120 28-140 48v160c0 80 60 140 140 180 80-40 140-100 140-180V120c-20-20-80-48-140-48z" fill="none" stroke="white" stroke-width="16" opacity="0.15"/>
  <!-- Clipboard body -->
  <rect x="148" y="140" width="216" height="270" rx="20" fill="white" opacity="0.95"/>
  <!-- Clipboard clip -->
  <rect x="208" y="116" width="96" height="48" rx="12" fill="#1e3a5f"/>
  <circle cx="256" cy="140" r="10" fill="#94a3b8"/>
  <!-- Check lines -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Row 1 - checked -->
    <rect x="180" y="200" width="28" height="28" rx="6" stroke="url(#check)" stroke-width="6" fill="#ecfdf5"/>
    <polyline points="188,215 196,223 210,205" stroke="url(#check)" stroke-width="6"/>
    <line x1="228" y1="214" x2="332" y2="214" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round"/>
    <!-- Row 2 - checked -->
    <rect x="180" y="252" width="28" height="28" rx="6" stroke="url(#check)" stroke-width="6" fill="#ecfdf5"/>
    <polyline points="188,267 196,275 210,257" stroke="url(#check)" stroke-width="6"/>
    <line x1="228" y1="266" x2="310" y2="266" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round"/>
    <!-- Row 3 - checked -->
    <rect x="180" y="304" width="28" height="28" rx="6" stroke="url(#check)" stroke-width="6" fill="#ecfdf5"/>
    <polyline points="188,319 196,327 210,309" stroke="url(#check)" stroke-width="6"/>
    <line x1="228" y1="318" x2="340" y2="318" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round"/>
    <!-- Row 4 - unchecked -->
    <rect x="180" y="356" width="28" height="28" rx="6" stroke="#94a3b8" stroke-width="5" fill="white"/>
    <line x1="228" y1="370" x2="300" y2="370" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
